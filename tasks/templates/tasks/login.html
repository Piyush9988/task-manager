<!DOCTYPE html>
<html>
<head>
<title>Login - Task Manager Universe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(120deg,#020024,#090979,#000000);
color:white;
}

/* CARD */

.card{
width:420px;
padding:40px;
border-radius:25px;
background:rgba(20,20,40,0.9);
box-shadow:0 0 60px #ff00ff;
}

/* HEADING */

h1{
text-align:center;
font-size:36px;
margin-bottom:25px;
color:#00ffff;
text-shadow:0 0 10px #00ffff,0 0 30px #ff00cc;
}

/* LABEL FIX */

label{
color:#00ffff;
font-weight:bold;
display:block;
margin-bottom:5px;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #00ffff;
background:#121245;
color:white;
}

/* PLACEHOLDER */

input::placeholder{
color:#9dfcff;
}

/* FOCUS GLOW */

input:focus{
outline:none;
box-shadow:0 0 10px #00ffff;
border:1px solid #00ffff;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:white;
font-weight:bold;
}

button:hover{
box-shadow:0 0 20px #ff00cc;
}

/* LOGIN TEXT */

.login-text{
text-align:center;
margin-top:15px;
color:white;
}

.login-text a{
color:#00ffff;
font-weight:bold;
text-decoration:none;
}

.login-text a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

<h1>🌌 Login</h1>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" placeholder="Enter username">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" placeholder="Enter password">
</div>

<button type="submit">Enter The Universe</button>

</form>

<div class="login-text">
Don't have an account?
<a href="{% url 'register' %}">Register</a>
</div>

</div>

</body>
</html>
