<!DOCTYPE html>
<html>
<head>
<title>Cosmic Task Manager - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:radial-gradient(circle at bottom,#020024,#090979,#000000);
overflow:auto;
color:white;
}

/* Cosmic Glow */

body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:conic-gradient(
#ff00cc,
#3333ff,
#00ffff,
#ff00cc,
#ff8800,
#ff00cc
);
animation:spin 60s linear infinite;
filter:blur(200px);
opacity:0.25;
z-index:0;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* Star Canvas */

#space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* Shooting Star */

.shooting{
position:absolute;
width:120px;
height:2px;
background:linear-gradient(90deg,white,transparent);
top:10%;
left:-150px;
animation:shoot 6s linear infinite;
z-index:1;
}

@keyframes shoot{
0%{transform:translateX(0) translateY(0) rotate(35deg);opacity:1;}
100%{transform:translateX(1600px) translateY(800px) rotate(35deg);opacity:0;}
}

/* Orbit Planet */

.planet{
position:absolute;
width:70px;
height:70px;
border-radius:50%;
background:radial-gradient(circle,#ff00cc,#330033);
box-shadow:0 0 40px #ff00cc;
animation:orbit 30s linear infinite;
z-index:1;
}

@keyframes orbit{
from{transform:rotate(0deg) translateX(320px) rotate(0deg);}
to{transform:rotate(360deg) translateX(320px) rotate(-360deg);}
}

/* Card */

.card{
width:450px;
padding:30px;
border-radius:25px;
background:rgba(20,20,40,0.92);
box-shadow:0 0 60px #ff00ff;
backdrop-filter:blur(20px);
z-index:2;
position:relative;
}

/* Heading */

h1{
text-align:center;
font-size:36px;
margin-bottom:25px;
font-weight:bold;
color:#00ffff;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #ff00cc;
}

/* Labels */

label{
display:block;
margin-bottom:6px;
font-weight:bold;
color:#00ffff;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #00ffff;
background:#121245;
color:white;
outline:none;
}

input:focus{
box-shadow:0 0 12px #00ffff;
}

/* Django Help Text */

.helptext{
display:block;
color:white;
font-size:13px;
margin-bottom:10px;
}

ul{
color:white;
font-size:13px;
}

/* Button */

.btn-trip{
margin-top:10px;
margin-bottom:10px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
background:linear-gradient(45deg,#ff00cc,#3333ff);
transition:0.3s;
color:white;
}

.btn-trip:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff00cc;
}

/* Login text */

.login-text{
margin-top:18px;
text-align:center;
font-size:16px;
color:white;
}

.login-text a{
color:#00ffff;
font-weight:bold;
text-decoration:none;
}

.login-text a:hover{
text-decoration:underline;
}

/* Cursor glow */

.cursor{
position:fixed;
width:15px;
height:15px;
border-radius:50%;
background:#ff00cc;
pointer-events:none;
box-shadow:0 0 20px #ff00cc;
z-index:3;
}

</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="shooting"></div>
<div class="planet"></div>

<div class="cursor" id="cursor"></div>

<div class="card">

<h1>Cosmic Task Manager</h1>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Username</label>
{{ form.username }}
</div>

<div class="mb-3">
<label>Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label>Password</label>
{{ form.password1 }}
</div>

<div class="mb-3">
<label>Confirm Password</label>
{{ form.password2 }}
</div>

<div class="helptext">
{{ form.username.help_text }}
{{ form.password1.help_text }}
</div>

<button class="btn-trip">Create Account</button>

</form>

<div class="login-text">
Already have an account?
<a href="/login/">Login</a>
</div>

</div>

<script>

/* Cursor glow */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* Starfield */

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let star of stars){

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();

}

}

drawStars();

document.addEventListener("mousemove",(e)=>{

for(let star of stars){

let dx=star.x-e.clientX;
let dy=star.y-e.clientY;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
star.x+=dx*0.02;
star.y+=dy*0.02;
}

}

drawStars();

});

</script>

</body>
</html>
